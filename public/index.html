<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening JOBSERVOO...</title>
    <style>
        :root {
            --primary-color: #0071e3;
            --bg-color: #f5f5f7;
            --text-color: #1d1d1f;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 90%;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.05);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: var(--primary-color);
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }
        p {
            font-size: 0.9rem;
            color: #86868b;
            line-height: 1.5;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Opening app...</h1>
        <p>We're taking you to the JOBSERVOO app. If you don't have it installed, you'll be redirected to the Play Store in a moment.</p>
        <a id="app-button" class="button" style="display: none; margin-top: 1.5rem; text-decoration: none; background: var(--primary-color); color: white; padding: 10px 20px; border-radius: 10px; font-weight: 600;">Open in JOBSERVOO</a>
    </div>

    <script>
        const path = window.location.pathname;
        const button = document.getElementById('app-button');
        
        if (path && path !== '/') {
            const appUrl = "jobservo:/" + path + window.location.search;
            
            // Set the manual button link
            button.href = appUrl;
            button.style.display = 'inline-block';
            
            // Try to open the app automatically
            window.location.href = appUrl;
        }

        // Redirect to Web or Play Store after a longer delay if app doesn't open
        setTimeout(function() {
            // Only redirect if they haven't successfully opened the app (we can't know for sure, but this is a fallback)
            if (path && path.startsWith('/job/')) {
                window.location.href = "https://jobservoo.web.app" + path + window.location.search;
            } else {
                window.location.href = "https://play.google.com/store/apps/details?id=com.jobservo.app";
            }
        }, 3500);
    </script>
</body>
</html>
